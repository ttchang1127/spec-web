<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>監造試驗查核 / 計畫產生</title>
<script src="spec_data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{ --bg:#f7f8fa; --card:#fff; --ink:#1c2330; --sub:#5b6472; --line:#e3e7ee;
    --accent:#2b6cb0; --ok:#2f855a; --warn:#c05621; --err:#c53030; --chip:#edf2f7; }
  @media (prefers-color-scheme:dark){ :root{ --bg:#12151b; --card:#1b1f27; --ink:#e6e9ef;
    --sub:#9aa4b2; --line:#2a2f3a; --accent:#63b3ed; --ok:#68d391; --warn:#f6ad55; --err:#fc8181; --chip:#252b36; } }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"PingFang TC","Noto Sans TC",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.55;font-size:15px}
  .wrap{max-width:1080px;margin:0 auto;padding:24px 18px 60px}
  h1{font-size:22px;margin:0 0 4px}
  .sub{color:var(--sub);margin:0 0 16px;font-size:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:16px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  button{font:inherit;padding:8px 14px;border-radius:8px;border:1px solid var(--line);background:var(--chip);color:var(--ink);cursor:pointer}
  button.primary{background:var(--accent);color:#fff;border-color:transparent}
  button.on{background:var(--accent);color:#fff;border-color:transparent}
  button:hover{filter:brightness(1.05)}
  .pill{background:var(--chip);border-radius:20px;padding:3px 12px;font-size:13px}
  .stat{display:flex;gap:14px;flex-wrap:wrap} .stat .box{background:var(--chip);border-radius:9px;padding:8px 14px;min-width:92px}
  .stat .box small{display:block;color:var(--sub);font-size:12px} .stat b{font-size:19px}
  table{border-collapse:collapse;width:100%;font-size:13.5px} .scroll{overflow-x:auto}
  th,td{border-bottom:1px solid var(--line);padding:7px 10px;text-align:left;vertical-align:top}
  th{color:var(--sub);font-weight:600;white-space:nowrap}
  .code{font-family:ui-monospace,Menlo,monospace;background:var(--chip);border-radius:5px;padding:1px 6px;font-size:12.5px}
  .grp .h{font-weight:700;font-size:15px}
  .miss{color:var(--err);font-weight:600} .ok{color:var(--ok)} .warn{color:var(--warn)}
  .n{font-variant-numeric:tabular-nums;font-weight:700}
  .muted{color:var(--sub);font-size:12.5px}
  .tag{font-size:11.5px;padding:1px 7px;border-radius:5px;font-weight:600}
  .tag.y{background:rgba(56,161,105,.15);color:var(--ok)} .tag.n{background:rgba(197,48,48,.15);color:var(--err)}
  .plan h2{font-size:18px;border-bottom:2px solid var(--accent);padding-bottom:4px;margin:22px 0 10px}
  .plan h3{font-size:15px;margin:16px 0 6px} .plan h4{font-size:14px;margin:12px 0 4px;color:var(--accent)}
  .plan p{margin:6px 0;font-size:13.5px} .plan ul{margin:4px 0 4px 20px;font-size:13.5px} .plan li{margin:2px 0}
  .plan table{margin:6px 0} .plan th,.plan td{border:1px solid var(--line)}
  .foot{color:var(--sub);font-size:12px;margin-top:22px}
  details summary{cursor:pointer;color:var(--sub)}
</style>
</head>
<body>
<div class="wrap">
  <h1>監造試驗查核 <span class="pill">v0.3</span></h1>
  <p class="sub">上傳空白標單（.xls/.xlsx）→ 兩用：<b>試驗查核</b>（應辦組數＋漏編）｜<b>監造計畫產生</b>（第五、七章草稿，可下載 .doc）。全程瀏覽器內處理，不上傳。</p>

  <div class="card">
    <div class="row">
      <label class="primary" style="padding:8px 14px;border-radius:8px;cursor:pointer">📄 上傳標單 .xls/.xlsx
        <input type="file" id="file" accept=".xls,.xlsx" style="display:none"></label>
      <button id="sampleBtn">▶ 載入範例標單</button>
      <span class="muted" id="src"></span>
    </div>
    <div class="row" style="margin-top:12px">
      <span class="muted">模式：</span>
      <button id="mCheck" class="on">🔍 試驗查核</button>
      <button id="mPlan">📝 監造計畫產生（第五/七章）</button>
      <button id="dl" style="display:none">⬇ 下載 .doc</button>
    </div>
    <div class="muted" style="margin-top:10px">規則來源：<span id="meta"></span></div>
  </div>

  <div id="out"></div>
  <p class="foot">v0.3 ｜ 燃料 spec_data.js（由 <span class="code">spec_kb_export.py</span> 從施工規範知識庫編譯）｜ 靜態 client-side</p>
</div>

<script>
const D = window.SPEC_DATA;
let LAST=null, MODE='check';
document.getElementById('meta').textContent =
  `工項 ${Object.keys(D.工項).length} 章碼｜試驗庫 ${D.meta.counts.試驗庫}｜標單別名 ${D.meta.counts.別名}（${D.meta.generated}）`;
const esc = s => String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const wiName = t => String(t||'').replace(/^工項\s*/,'');

// ---- 常數塊（監造計畫製作綱要 第五/七章樣板；SSOT 見 KB 04 章樣板卡）----
const BOILER = {
  s51: ['送審管制：廠商擬用之材料/設備，備料前提送型錄、試驗報告、材料規範、樣品及協力廠商證明送監造審查（管制總表表5.1），合格始得進場施工。',
        '試驗單位審查：需取樣試驗者，試驗室應事先送審；鋼筋、混凝土、瀝青混凝土等應由符合 CNS 17025（ISO/IEC 17025）之實驗室辦理並附認證標誌（作業要點§12）。',
        '抽驗作業：監造單位依本計畫所訂頻率會同廠商取樣、送驗並判定；使用之品質抽驗紀錄表依下列材料品質標準訂定。',
        '進場查驗：不需取樣試驗之材料，進場時仍應查驗核對，確認與送審合格者相符。',
        '結果管制：檢/試驗結果之合格與不合格處理如表5.2；不合格應辦不合格報告及通知，要求辦理矯正與預防措施並列管改善。',
        '費用：材料設備抽（檢）驗費用依作業要點§13於招標文件單獨量化編列。',
        '變更：變更設計涉材料或工法變更時，即時修訂本章材料品質標準。'],
  s71: ['檢驗停留點（Hold Point）抽查：隱蔽部分及重要結構施工項目列為停留點，於開工前（函送本監造計畫同時）明確告知廠商檢驗時點；廠商完成自主檢查後提出檢驗申請，經監造單位到場抽查合格，方得進行次一工序。',
        '不定期抽查：對非停留點項目由監造單位不定期抽查，並於施工品質抽查紀錄表簽認。',
        '結果處置：可即時改正之缺失當場通知限期改正並複查；重大缺失或重複性不合格辦不合格報告及通知，要求辦理矯正與預防措施，建立缺失改善管制表定期列管。',
        '簽認原則：監造單位不得於廠商自主檢查表上簽證；監造抽查紀錄表至少含抽查項目、標準、位置、結果等欄位。']
};

function parseWB(wb){
  let items=[], tests=new Set();
  for(const sn of wb.SheetNames){
    const aoa = XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,raw:false});
    const hi = aoa.findIndex(r=>r&&r.some(c=>/項\s*目|品名|說明/.test(c||''))&&r.some(c=>/編\s*碼/.test(c||'')));
    if(hi>=0 && !items.length){
      const hdr=aoa[hi].map(c=>String(c||''));
      const find=re=>hdr.findIndex(h=>re.test(h));
      const iN=find(/項\s*目|品名|說明/), iU=find(/單\s*位/), iQ=find(/數\s*量/), iC=find(/編\s*碼/);
      for(const r of aoa.slice(hi+1)){ if(!r) continue;
        const m=String(r[iC]||'').trim().match(/^(\d{5})/); const name=String(r[iN]||'').trim();
        if(m&&name){ const q=parseFloat(String(r[iQ]||'').replace(/[,，\s]/g,''));
          items.push({章碼:m[1],項目:name,單位:String(r[iU]||'').trim(),數量:isNaN(q)?null:q}); }
      }
    }
    if(/資源|統計/.test(sn)) for(const r of aoa){ if(!r) continue;
      for(const c of r){ const s=String(c||'').trim(); if(/試驗/.test(s)&&s.length>3) tests.add(s); } }
  }
  return {items, tests:[...tests]};
}
function calcN(machine,qty,unit){
  const m=machine||{}, u=(unit||'').toLowerCase().replace('㎡','m2').replace('㎥','m3');
  if(u==='m3'&&m.per_m3) return {n:Math.ceil(qty/m.per_m3),note:m.per_day_min?'另每日≥'+m.per_day_min+'（取大值）':''};
  if(u==='m2'&&m.per_m2) return {n:Math.ceil(qty/m.per_m2),note:''};
  if(u==='m2'&&m.per_m2_per_layer) return {n:Math.ceil(qty/m.per_m2_per_layer),note:'×分層數'};
  if(m.per_m2_per_layer) return {n:null,note:'每層每'+m.per_m2_per_layer+'m²（需面積×層數）'};
  if(m.per_batch) return {n:null,note:'每批×'+m.per_batch+'（需批數）'};
  if(m.per_truck) return {n:null,note:'每車'};
  if(m.per_source) return {n:null,note:'每料源'};
  if(m.per_lane_m) return {n:null,note:'每車道'+m.per_lane_m+'m'};
  return {n:null,note:''};
}
function grouped(items){ const b={}; items.forEach(it=>{(b[it.章碼]=b[it.章碼]||[]).push(it);});
  return Object.keys(b).sort().map(c=>({code:c,wi:D.工項[c],rows:b[c]})); }

// ================= 試驗查核 =================
function renderCheck(){
  const {items,tests}=LAST;
  let 命中=0,未建=0,漏編=0,cards='',未建list=[];
  for(const {code,wi,rows} of grouped(items)){
    if(!wi){未建++;未建list.push(`<tr><td><span class="code">${code}</span></td><td>${rows.length}</td><td class="muted">${esc(rows[0].項目.slice(0,28))}</td></tr>`);continue;}
    命中++;
    const lib=D.試驗庫[wi.試驗頻率卡];
    const uC={};rows.forEach(r=>{if(r.單位)uC[r.單位]=(uC[r.單位]||0)+1;});
    const unit=Object.keys(uC).sort((a,b)=>uC[b]-uC[a])[0]||'';
    const qty=rows.filter(r=>r.單位===unit).reduce((s,r)=>s+(r.數量||0),0);
    let body='';
    if(lib) for(const t of lib.試驗項目){
      const c=calcN(t.機器,qty,unit);
      const nCell=c.n!=null?`<span class="n ok">${c.n}</span> 組`:`<span class="warn">${esc(c.note||'—')}</span>`;
      let tg='<span class="muted">—</span>';
      if(t.關鍵字&&t.關鍵字.length){const hit=tests.some(nm=>t.關鍵字.some(k=>nm.includes(k)));tg=hit?'<span class="tag y">已編列</span>':'<span class="tag n">⚠ 漏編</span>';if(!hit)漏編++;}
      body+=`<tr><td>${esc(t.項目)}</td><td>${esc(t.頻率)}</td><td>${nCell}</td><td>${tg}</td><td class="muted">${esc(t.依據)}</td></tr>`;
    }
    const fam=code!==wi.chapter_code?`（家族→${wi.chapter_code}）`:'';
    cards+=`<div class="card"><div class="scroll"><table>
      <tr class="grp"><td colspan="5" class="h ok">✓ <span class="code">${code}</span>${fam} ${esc(wi.title)} <span class="muted">　合計 ${qty||'—'} ${esc(unit)}</span></td></tr>
      <tr><th>應辦試驗項目</th><th>頻率</th><th>應辦組數</th><th>標單編列</th><th>依據</th></tr>${body}</table></div></div>`;
  }
  const summary=`<div class="card"><div class="stat">
    <div class="box"><small>標單章碼</small><b>${grouped(items).length}</b></div>
    <div class="box"><small>對到工項</small><b class="ok">${命中}</b></div>
    <div class="box"><small>未建工項</small><b class="${未建?'miss':''}">${未建}</b></div>
    <div class="box"><small>疑似漏編</small><b class="${漏編?'warn':''}">${漏編}</b></div>
    <div class="box"><small>編列試驗</small><b>${tests.length}</b></div></div></div>`;
  const 未建card=未建list.length?`<div class="card"><details><summary class="miss" style="font-weight:600">⚠ 未建工項卡的章碼 ${未建list.length} 個（覆蓋缺口）</summary><div class="scroll" style="margin-top:8px"><table><tr><th>章碼</th><th>項數</th><th>例</th></tr>${未建list.join('')}</table></div></details></div>`:'';
  document.getElementById('out').innerHTML=summary+cards+未建card;
  document.getElementById('dl').style.display='none';
}

// ================= 監造計畫產生（第五、七章）=================
function planHTML(){
  const matched=grouped(LAST.items).filter(x=>x.wi);
  // 第五章
  let ch5=''; for(const {code,wi} of matched){ const lib=D.試驗庫[wi.試驗頻率卡]; if(!lib) continue;
    for(const t of lib.試驗項目) ch5+=`<tr><td>${esc(wiName(wi.title))}</td><td>${esc(t.項目)}</td><td>${esc(t.判定||'—')}</td><td>${esc(t.頻率)}</td><td>${esc(t.依據)}</td></tr>`; }
  // 第七章
  let ch7='', holds='';
  for(const {code,wi} of matched){
    let sp=''; for(const s of (wi.停留點||[])){ sp+=`<tr><td>${esc(s.階段)}</td><td>${esc(s.查驗項目)}</td><td>${esc(s.停留點)}</td></tr>`;
      if((s.停留點||'').includes('＊')||(s.停留點||'').includes('*')) holds+=`<li>${esc(wiName(wi.title))}（${code}）：${esc(s.查驗項目)}〔${esc(s.階段)}〕</li>`; }
    const red=(wi.查核紅線||[]).map(r=>`<li>${esc(r)}</li>`).join('');
    ch7+=`<h4>${esc(wi.title)}（${code}）</h4>
      <table><tr><th>施工階段</th><th>查驗項目</th><th>檢驗停留點</th></tr>${sp||'<tr><td colspan=3 class=muted>（停留點待補）</td></tr>'}</table>
      ${red?`<p><b>量化抽查紅線：</b></p><ul>${red}</ul>`:''}`;
  }
  const li5=BOILER.s51.map(t=>`<li>${esc(t)}</li>`).join('');
  const li7=BOILER.s71.map(t=>`<li>${esc(t)}</li>`).join('');
  return `<div class="plan">
    <p class="muted">※ 依標單對到之工項自動生成；常數塊源自監造計畫製作綱要第五/七章樣板，數值源自施工規範知識庫（可追溯）。請依契約與實際工項增修。</p>
    <h2>第五章　材料與設備抽驗程序及標準</h2>
    <h3>5.1 抽驗作業程序</h3><ol>${li5}</ol>
    <h3>5.2 材料品質標準</h3>
    <table><tr><th>材料/工項</th><th>試驗項目</th><th>抽驗標準</th><th>抽驗頻率</th><th>依據</th></tr>${ch5||'<tr><td colspan=5 class=muted>（標單未對到已建工項）</td></tr>'}</table>
    <h3>5.3 應用表單</h3><ul><li>表5.1 材料設備送審管制總表</li><li>表5.2 材料設備檢（試）驗管制總表</li></ul>
    <h2>第七章　施工抽查程序及標準</h2>
    <h3>7.1 施工抽查程序</h3><ol>${li7}</ol>
    <h3>7.2 施工抽查標準（依工項）</h3>${ch7||'<p class=muted>（標單未對到已建工項）</p>'}
    <h3>7.3 檢驗停留點清單</h3><ul>${holds||'<li class=muted>（無）</li>'}</ul>
    <h3>7.4 應用表單</h3><ul><li>表7.1 施工抽查標準一覽表</li><li>表7.2 各工項施工抽查標準</li><li>表7.3 施工抽查紀錄</li></ul>
  </div>`;
}
function renderPlan(){
  document.getElementById('out').innerHTML=`<div class="card">${planHTML()}</div>`;
  document.getElementById('dl').style.display='';
}
function downloadDoc(){
  const html=planHTML().replace(/class="[^"]*"/g,'');
  const doc=`<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word'><head><meta charset='utf-8'>
    <style>body{font-family:'標楷體',serif;font-size:12pt;line-height:1.6}table{border-collapse:collapse;width:100%}td,th{border:1px solid #000;padding:4px 6px;font-size:10.5pt}h2{font-size:15pt;border-bottom:1.5pt solid #000;padding-bottom:2pt}h3{font-size:13pt}h4{font-size:12pt}ol,ul{margin:4pt 0 4pt 22pt}</style></head>
    <body>${html}</body></html>`;
  const blob=new Blob(['﻿'+doc],{type:'application/msword'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='監造計畫_第五七章_草稿.doc'; a.click();
}

function render(){ if(!LAST){document.getElementById('out').innerHTML='';return;} MODE==='plan'?renderPlan():renderCheck(); }
function setMode(m){ MODE=m;
  document.getElementById('mCheck').className=m==='check'?'on':'';
  document.getElementById('mPlan').className=m==='plan'?'on':''; render(); }

function loadWB(wb,label){ LAST=parseWB(wb); document.getElementById('src').textContent=label+`（工項 ${LAST.items.length}）`; render(); }
document.getElementById('file').onchange=e=>{const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();rd.onload=ev=>loadWB(XLSX.read(ev.target.result,{type:'array'}),'上傳：'+f.name);rd.readAsArrayBuffer(f);};
document.getElementById('sampleBtn').onclick=()=>fetch('sample.xls').then(r=>r.arrayBuffer())
  .then(b=>loadWB(XLSX.read(b,{type:'array'}),'範例：航空城復原工程開口契約'))
  .catch(()=>document.getElementById('out').innerHTML='<div class="card miss">範例載入失敗（需 http 伺服器）。請改用上傳。</div>');
document.getElementById('mCheck').onclick=()=>setMode('check');
document.getElementById('mPlan').onclick=()=>setMode('plan');
document.getElementById('dl').onclick=downloadDoc;
</script>
</body>
</html>
